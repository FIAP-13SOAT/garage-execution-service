name: Code Quality

on:
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: Code Quality Report
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect duplications (jscpd)
        run: |
          npx jscpd src/ \
            --reporters json \
            --output .jscpd \
            --min-lines 5 \
            --min-tokens 50 \
            --ignore "**/__tests__/**" || true

      - name: ESLint analysis (JSON)
        run: npx eslint src/ --format json --output-file eslint-report.json || true

      - name: Post quality comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            let pct = 0, dupLines = 0, clones = 0;
            try {
              const jscpd = JSON.parse(fs.readFileSync('.jscpd/jscpd-report.json', 'utf8'));
              const stats = jscpd.statistics?.total || {};
              pct = +(stats.percentage || 0).toFixed(1);
              dupLines = stats.duplicatedLines || 0;
              clones = (jscpd.duplicates || []).length;
            } catch (_) {}

            let sonarjs = 0, security = 0, typescript = 0;
            try {
              const eslint = JSON.parse(fs.readFileSync('eslint-report.json', 'utf8'));
              const msgs = eslint.flatMap(f => f.messages).filter(m => m.ruleId);
              sonarjs   = msgs.filter(m => m.ruleId.startsWith('sonarjs/')).length;
              security  = msgs.filter(m => m.ruleId.startsWith('security/')).length;
              typescript = msgs.filter(m => m.ruleId.startsWith('@typescript-eslint/')).length;
            } catch (_) {}

            const smellIcon = sonarjs === 0 ? '🟢' : sonarjs <= 5 ? '🟡' : '🔴';
            const dupIcon   = pct === 0 ? '🟢' : pct <= 3 ? '🟡' : '🔴';
            const secIcon   = security === 0 ? '🟢' : '🔴';

            const marker = '<!-- code-quality-report -->';
            const body = `${marker}
            ## 🔍 Code Quality Report

            ### Duplicação de Código ${dupIcon}
            | Métrica | Valor |
            | --- | --- |
            | Duplicação | ${pct}% |
            | Linhas duplicadas | ${dupLines} |
            | Blocos clonados | ${clones} |

            ### Code Smells ${smellIcon}
            | Categoria | Issues |
            | --- | --- |
            | SonarJS | ${sonarjs} |
            | TypeScript | ${typescript} |

            ### Segurança ${secIcon}
            | Categoria | Issues |
            | --- | --- |
            | Security plugin | ${security} |

            > 💬 Detalhes na aba **Files changed** via ESLint reviewdog.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
