apiVersion: apps/v1
kind: Deployment
metadata:
  name: garage-execution-service
  namespace: default
  labels:
    app: garage-execution-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: garage-execution-service
  template:
    metadata:
      labels:
        app: garage-execution-service
      annotations:
        ad.datadoghq.com/garage-execution-service.logs: '[{"source":"nodejs","service":"garage-execution-service"}]'
    spec:
      containers:
        - name: garage-execution-service
          image: 500431122450.dkr.ecr.us-east-1.amazonaws.com/garage-execution-service:execution-latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: garage-execution-service-config
          env:
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          resources:
            requests:
              memory: "256Mi"
              cpu: "125m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
